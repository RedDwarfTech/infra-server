name: infra-k8s-pro

on:
  push:
    branches: [ main-legacy ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}
        username: ${{ secrets.ALIYUN_DOCKER_REPO_USER_NAME }}
        password: ${{ secrets.ALIYUN_DOCKER_REPO_USER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        cache-from: type=gha
        cache-to: type=gha,mode=max
        file: Dockerfile
        push: true
        tags: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/reddwarf-pro/infra-server:${{ github.sha }}
        provenance: false
        sbom: false

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.21.0

    - name: Configure kubeconfig
      env:
        KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      run: |
        mkdir -p ~/.kube
        echo "$KUBE_CONFIG_DATA" | base64 -d > ~/.kube/config

    - name: Sync Turnstile secret to ConfigMap
      env:
        CF_TURNSTILE_SECRET_KEY: ${{ secrets.CF_TURNSTILE_SECRET_KEY }}
      run: |
        kubectl patch configmap infra-server-service-pro-config \
          -n reddwarf-pro \
          --type merge \
          -p "{\"data\":{\"cf_turnstile_secret_key\":\"${CF_TURNSTILE_SECRET_KEY}\"}}"

    - name: Update image tag in StatefulSet manifest
      run: |
        sed -i "s|registry.cn-hongkong.aliyuncs.com/reddwarf-pro/infra-server:.*|${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/reddwarf-pro/infra-server:${{ github.sha }}|" \
          doc/deploy/statefulset/infra-server-service.yaml

    - name: Apply service manifest
      run: kubectl apply -f doc/deploy/service/infra-server-service.yaml

    - name: Apply statefulset manifest
      run: kubectl apply -f doc/deploy/statefulset/infra-server-service.yaml

    - name: Verify statefulset rollout
      run: kubectl rollout status statefulset/infra-server-service -n reddwarf-pro --timeout=180s
